<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n00bywan - Ultra Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* VIDEO BACKGROUND */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.95));
    z-index: -1;
}

/* LOGO ANIME */
@keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); }
    50% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); }
}

.logo {
    font-size: 60px;
    font-weight: 900;
    color: white;
    -webkit-text-stroke: 1px #FFD700;
    animation: glowPulse 3s infinite ease-in-out;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

/* STYLE DES LOGOS CLICABLES */
.logo-link {
    transition: all 0.4s ease-in-out;
    display: inline-block;
    cursor: pointer;
}

.logo-link img {
    width: 300px; /* Ajustez la taille de vos logos ici */
    height: auto;
    display: block;
}

/* EFFET DE SURBRILLANCE AU SURVOL */
.logo-link:hover {
    transform: scale(1.1);
    filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.7));
}
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
    <source src="images/orage.mp4" type="video/mp4">
</video>

<div id="overlay"></div>

<div class="flex flex-col items-center justify-center min-h-screen text-center p-6">

    <img src="images/1024x1012.png" alt="Logo Image" class="w-60 h-auto mb-4 mx-auto">

    <h1 class="logo mb-6">n00bywan</h1>

    <p class="text-gray-400 mb-12 uppercase tracking-widest text-xs">
        Sélectionnez Une Plateforme
    </p>

    <div class="flex flex-wrap justify-center gap-12">

        <a href="https://discord.gg/yHXBNCb6bp" class="logo-link">
            <img src="images/Discord.png" alt="Description 1">
        </a>

        <a href="https://lucid.app/lucidchart/c480f864-df84-4d28-afb5-65fd1145c745/edit?page=Cy0KzTpPzZfn#" class="logo-link">
            <img src="images/GZW.png" alt="Description 2">
        </a>

        <a href="https://x.com/_n00bywan_" class="logo-link">
            <img src="images/X.png" alt="Description 3">
        </a>
		
		<a href="https://www.twitch.tv/n00bywan" class="logo-link">
            <img src="images/Twitch.png" alt="Description 1">
        </a>

    </div>
</div>

</body>
</html>

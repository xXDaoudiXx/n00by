<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xXDaoudiXx - Ultra Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* VIDEO BACKGROUND */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.95));
    z-index: -1;
}

/* LOGO ANIME - ÉCLAT ADOUCI */
@keyframes glowPulse {
    0%, 100% { 
        filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); 
    }
    50% { 
        filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); 
    }
}

.logo {
    font-size: 60px;
    font-weight: 900;
    color: white;
    -webkit-text-fill-color: white;
    /* Contour plus fin */
    -webkit-text-stroke: 1px #FFD700;
    /* Animation plus discrète */
    animation: glowPulse 3s infinite ease-in-out;
    /* Ombre de base réduite */
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

/* CARTES */
.card {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px;
    padding: 40px;
    width: 300px;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: 0.4s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,215,0,0.4);
}

/* BOUTON */
.btn {
    margin-top: 20px;
    padding: 12px;
    border: 1px solid gold;
    border-radius: 10px;
    text-transform: uppercase;
    font-weight: bold;
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: "";
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, gold, transparent);
}

.btn:hover::before {
    left: 100%;
    transition: 0.5s;
}

.btn:hover {
    box-shadow: 0 0 20px gold;
}
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
    <source src="orage.mp4" type="video/mp4">
</video>

<div id="overlay"></div>

<div class="flex flex-col items-center justify-center min-h-screen text-center p-6">

<img src="1024x1012.png" alt="Logo Image" class="w-24 h-auto mb-4 mx-auto">

<h1 class="logo mb-6">n00bywan</h1>

<p class="text-gray-400 mb-10 uppercase tracking-widest text-xs">
Plateforme Premium Streaming
</p>

<div class="flex justify-center">

<div class="card">
    <h2>Films et Séries</h2>
    <img src="images/series.png" class="w-48 mx-auto" alt="Films et Séries">
    <a href="https://warflix.im/movie" class="btn block">Entrer</a>
</div>

</div>
</div>

</body>
</html>
